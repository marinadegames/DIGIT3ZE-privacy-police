<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Privacy Policy - DIGIT3ZE</title>
    <style>
      :root {
        --bg: #111317;
        --card: #1b1f27;
        --text: #e8ebf0;
        --muted: #aab2c0;
        --accent: #7aa2ff;
        --border: #2a3140;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial,
          sans-serif;
        line-height: 1.6;
        padding: clamp(16px, 3vw, 32px);
        padding-top: clamp(52px, 8vw, 64px);
      }
      .lang-switch {
        position: fixed;
        top: clamp(12px, 2.5vw, 20px);
        right: clamp(12px, 2.5vw, 24px);
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 4px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 4px;
      }
      .lang-switch button {
        margin: 0;
        border: none;
        background: transparent;
        color: var(--muted);
        font: inherit;
        font-size: 0.875rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        cursor: pointer;
        padding: 8px 14px;
        border-radius: 999px;
        line-height: 1;
      }
      .lang-switch button:hover {
        color: var(--text);
      }
      .lang-switch button[aria-pressed="true"] {
        color: var(--text);
        background: rgba(122, 162, 255, 0.18);
      }
      .lang-switch .lang-sep {
        width: 1px;
        height: 16px;
        background: var(--border);
        flex-shrink: 0;
      }
      .container {
        max-width: 860px;
        margin: 0 auto;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: clamp(16px, 4vw, 36px);
      }
      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.6rem, 3.5vw, 2.2rem);
        line-height: 1.2;
      }
      .meta {
        margin: 0 0 22px;
        color: var(--muted);
        font-size: 0.95rem;
      }
      h2 {
        margin: 24px 0 10px;
        font-size: clamp(1.08rem, 2.3vw, 1.28rem);
      }
      p,
      li {
        color: var(--muted);
      }
      ul {
        margin: 8px 0 0;
        padding-left: 20px;
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .contact {
        margin-top: 28px;
        padding-top: 18px;
        border-top: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <script

    <div
      class="lang-switch"
      role="group"
      aria-label="Language / Язык"
    >
      <button type="button" id="lang-ru" data-lang="ru" aria-pressed="false">
        RU
      </button>
      <span class="lang-sep" aria-hidden="true"></span>
      <button type="button" id="lang-en" data-lang="en" aria-pressed="true">
        EN
      </button>
    </div>

    <main class="container">
      <div id="policy-root" class="policy-root" lang="en"></div>
    </main>

    <script>
      (function () {
        var STORAGE_KEY = "digit3ze-privacy-lang";
        var ruBtn = document.getElementById("lang-ru");
        var enBtn = document.getElementById("lang-en");
        var policyRoot = document.getElementById("policy-root");
        var cache = {};

        function readEmbedded(code) {
          var el = document.getElementById("translations-" + code);
          if (!el) throw new Error("Missing translations-" + code);
          return JSON.parse(el.textContent.trim());
        }

        cache.en = readEmbedded("en");
        cache.ru = readEmbedded("ru");

        function renderPolicy(root, data) {
          root.replaceChildren();
          root.lang = data.htmlLang || data.code || "en";

          var h1 = document.createElement("h1");
          h1.textContent = data.h1;
          root.appendChild(h1);

          var meta = document.createElement("p");
          meta.className = "meta";
          meta.textContent =
            data.meta.brand +
            " · " +
            data.meta.updatedLabel +
            " " +
            data.meta.updatedDate;
          root.appendChild(meta);

          var intro = document.createElement("p");
          intro.textContent = data.intro;
          root.appendChild(intro);

          (data.sections || []).forEach(function (sec) {
            var h2 = document.createElement("h2");
            h2.textContent = sec.h2;
            root.appendChild(h2);
            (sec.paragraphs || []).forEach(function (text) {
              var p = document.createElement("p");
              p.textContent = text;
              root.appendChild(p);
            });
            if (sec.list && sec.list.length) {
              var ul = document.createElement("ul");
              sec.list.forEach(function (item) {
                var li = document.createElement("li");
                if (typeof item === "string") {
                  li.textContent = item;
                } else if (item && item.href && item.text) {
                  var a = document.createElement("a");
                  a.href = item.href;
                  a.target = "_blank";
                  a.rel = "noopener";
                  a.textContent = item.text;
                  li.appendChild(a);
                }
                ul.appendChild(li);
              });
              root.appendChild(ul);
            }
          });

          var contactP = document.createElement("p");
          contactP.className = "contact";
          contactP.appendChild(
            document.createTextNode(data.contact.before + " ")
          );
          var mail = document.createElement("a");
          mail.href = "mailto:" + data.contact.email;
          mail.textContent = data.contact.email;
          contactP.appendChild(mail);
          root.appendChild(contactP);
        }

        function prefersRussianBrowser() {
          var list =
            navigator.languages && navigator.languages.length
              ? navigator.languages
              : [navigator.language || ""];
          for (var i = 0; i < list.length; i++) {
            var tag = (list[i] || "").toLowerCase();
            if (tag === "ru" || tag.indexOf("ru-") === 0) return true;
          }
          return false;
        }

        function hashLang() {
          var h = (location.hash || "").toLowerCase().replace(/^#/, "");
          if (h === "ru" || h === "en") return h;
          return null;
        }

        function setLang(code, options) {
          options = options || {};
          var lang = code === "ru" ? "ru" : "en";
          var data = cache[lang];
          if (!data) return;

          document.documentElement.lang = data.htmlLang || lang;
          document.title = data.title;
          renderPolicy(policyRoot, data);
          ruBtn.setAttribute("aria-pressed", lang === "ru" ? "true" : "false");
          enBtn.setAttribute("aria-pressed", lang === "en" ? "true" : "false");

          if (!options.skipHash) {
            var next = "#" + lang;
            if (location.hash !== next) {
              history.replaceState(null, "", next);
            }
          }
          try {
            localStorage.setItem(STORAGE_KEY, lang);
          } catch (e) {}
        }

        ruBtn.addEventListener("click", function () {
          setLang("ru");
        });
        enBtn.addEventListener("click", function () {
          setLang("en");
        });

        window.addEventListener("hashchange", function () {
          var hl = hashLang();
          if (hl && cache[hl]) setLang(hl, { skipHash: true });
        });

        var fromHash = hashLang();
        var stored = null;
        try {
          stored = localStorage.getItem(STORAGE_KEY);
        } catch (e) {}

        var initial = fromHash;
        if (initial !== "ru" && initial !== "en") {
          if (stored === "ru" || stored === "en") {
            initial = stored;
          } else {
            initial = prefersRussianBrowser() ? "ru" : "en";
          }
        }

        setLang(initial, { skipHash: !!fromHash });
      })();
    </script>
  </body>
</html>
